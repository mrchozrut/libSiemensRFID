    # Azure DevOps Pipeline for building and publishing Siemens RFID library
    # This pipeline builds the solution and publishes NuGet packages to Azure Artifacts
    # Note: Tests are skipped as the library requires physical RFID hardware for testing

    # PUBLISH CONFIGURATION:
    # - Publish stage only runs on 'main' branch (line 97)
    # - To publish to Azure Artifacts feed, ensure:
    #   1. Feed exists: Lucenec_0798_OT/Automation ?
    #   2. Build service has 'Contributor' permissions on the feed
    #   3. 'Production' environment is created in Environments
    # - Feed URL: https://adient.visualstudio.com/Lucenec_0798_OT/_artifacts/feed/Automation

    trigger:
      branches:
        include:
          - main
          - develop
      paths:
        exclude:
          - README.md
          - docs/*

    pr:
      branches:
        include:
          - main
          - develop

    pool:
      vmImage: 'windows-latest'

    variables:
        solution: 'Adient.Automation.Lucenec.RFID.SiemensRF600/Adient.Automation.Lucenec.RFID.SiemensRF600.sln'
        buildPlatform: 'Any CPU'
        buildConfiguration: 'Release'
        majorVersion: '1'
        minorVersion: '0'
        patchVersion: $[counter(format('{0}.{1}', variables['majorVersion'], variables['minorVersion']), 0)]
        buildNumber: $[format('{0}.{1}.{2}', variables['majorVersion'], variables['minorVersion'], variables['patchVersion'])]
        nugetVersion: '$(buildNumber)'

    stages:
    - stage: Build
      displayName: 'Build and Package'
      jobs:
      - job: BuildJob
        displayName: 'Build Solution'
        steps:

        - task: Cache@2
          displayName: 'Cache NuGet packages'
          inputs:
            key: 'nuget | "$(Agent.OS)" | Adient.Automation.Lucenec.RFID.SiemensRF600/packages.lock.json'
            restoreKeys: |
              nuget | "$(Agent.OS)"
            path: '$(UserProfile)\.nuget\packages'
            cacheHitVar: CACHE_RESTORED

        - task: DotNetCoreCLI@2
          displayName: 'Restore NuGet packages'
          inputs:
            command: 'restore'
            projects: 'Adient.Automation.Lucenec.RFID.SiemensRF600/Adient.Automation.Lucenec.RFID.SiemensRF600.csproj'
            feedsToUse: 'config'
            nugetConfigPath: 'NuGet.config'
            restoreArguments: '--locked-mode'
          condition: ne(variables.CACHE_RESTORED, 'true')

        - task: DotNetCoreCLI@2
          displayName: 'Build Library Project (always runs)'
          inputs:
            command: 'build'
            projects: 'Adient.Automation.Lucenec.RFID.SiemensRF600/Adient.Automation.Lucenec.RFID.SiemensRF600.csproj'
            arguments: '--configuration $(buildConfiguration) /p:Version=$(nugetVersion)'

        - script: |
            echo "============================================"
            echo "         BUILD OUTPUT VERIFICATION          "
            echo "============================================"
            echo ""
            echo "Cache Status: $(CACHE_RESTORED)"
            echo "Agent: $(Agent.MachineName)"
            echo "OS: $(Agent.OS)"
            echo ""
            echo "Checking build output directory..."
            echo "Expected location: D:\a\1\s\Adient.Automation.Lucenec.RFID.SiemensRF600\bin\$(buildConfiguration)\net8.0\"
            echo ""
            if exist "D:\a\1\s\Adient.Automation.Lucenec.RFID.SiemensRF600\bin\$(buildConfiguration)\net8.0\Adient.Automation.Lucenec.RFID.SiemensRF600.dll" (
              echo [SUCCESS] Main DLL found!
              dir "D:\a\1\s\Adient.Automation.Lucenec.RFID.SiemensRF600\bin\$(buildConfiguration)\net8.0" /b
            ) else (
              echo [ERROR] Main DLL NOT found!
              echo "Searching for any bin directories..."
              dir "D:\a\1\s\Adient.Automation.Lucenec.RFID.SiemensRF600\bin" /s /b
            )
            echo ""
            echo "============================================"
          displayName: 'Verify Build Output'
          condition: succeededOrFailed()

        - task: DotNetCoreCLI@2
          displayName: 'Pack NuGet Package (always runs)'
          inputs:
            command: 'pack'
            packagesToPack: 'Adient.Automation.Lucenec.RFID.SiemensRF600/Adient.Automation.Lucenec.RFID.SiemensRF600.csproj'
            configuration: '$(buildConfiguration)'
            nobuild: false
            includesymbols: true
            includesource: true
            versioningScheme: 'byEnvVar'
            versionEnvVar: 'nugetVersion'
            packDirectory: '$(Build.ArtifactStagingDirectory)/packages'
            verbosityPack: 'Detailed'

        - script: |
            echo "============================================"
            echo "       NUGET PACKAGE CREATION SUMMARY       "
            echo "============================================"
            echo ""
            echo "Package Version: $(nugetVersion)"
            echo "Configuration: $(buildConfiguration)"
            echo "Output Directory: $(Build.ArtifactStagingDirectory)\packages"
            echo ""
            echo "--- Directory Structure ---"
            dir "$(Build.ArtifactStagingDirectory)" /s
            echo ""
            echo "--- Package Files Created ---"
            if exist "$(Build.ArtifactStagingDirectory)\packages\*.nupkg" (
              for %%F in ("$(Build.ArtifactStagingDirectory)\packages\*.nupkg") do (
                echo [SUCCESS] Package: %%~nxF
                echo           Size: %%~zF bytes
                echo           Path: %%~fF
                echo ""
              )
            ) else (
              echo [ERROR] No .nupkg files found in $(Build.ArtifactStagingDirectory)\packages!
              echo ""
              echo "Checking if pack task ran correctly..."
              echo "Expected output: Adient.Automation.Lucenec.RFID.SiemensRF600.$(nugetVersion).nupkg"
              echo ""
              echo "Possible causes:"
              echo "  1. IsPackable=false in project file"
              echo "  2. Pack task failed silently"
              echo "  3. Incorrect packDirectory path"
              echo ""
              exit /b 1
            )
            echo ""
            echo "--- Symbol Package Files ---"
            if exist "$(Build.ArtifactStagingDirectory)\packages\*.snupkg" (
              for %%F in ("$(Build.ArtifactStagingDirectory)\packages\*.snupkg") do (
                echo [SUCCESS] Symbol Package: %%~nxF
                echo           Size: %%~zF bytes
                echo ""
              )
            ) else (
              echo [INFO] No symbol packages found (this is normal if symbols are embedded)
            )
            echo ""
            echo "============================================"
          displayName: 'Verify Package Creation'

        - task: PublishPipelineArtifact@1
          displayName: 'Publish NuGet Package as Pipeline Artifact'
          inputs:
            targetPath: '$(Build.ArtifactStagingDirectory)/packages'
            artifactName: 'packages'
            publishLocation: 'pipeline'

        - script: |
            echo "============================================"
            echo "   PIPELINE ARTIFACT PUBLISHING SUMMARY    "
            echo "============================================"
            echo ""
            echo "Artifact Name: packages"
            echo "Source Path: $(Build.ArtifactStagingDirectory)\packages"
            echo ""
            echo "Files being published as pipeline artifacts:"
            dir "$(Build.ArtifactStagingDirectory)\packages" /b
            echo ""
            echo "============================================"
          displayName: 'Artifact Publishing Summary'
          condition: succeededOrFailed()

    - stage: Publish
      displayName: 'Publish to Azure Artifacts'
      dependsOn: Build
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
      jobs:
      - deployment: PublishNuGet
        displayName: 'Publish NuGet Package'
        environment: 'Production'
        strategy:
          runOnce:
            deploy:
              steps:
              - task: DownloadPipelineArtifact@2
                displayName: 'Download NuGet Package'
                inputs:
                  artifact: 'packages'
                  path: '$(Pipeline.Workspace)/packages'

              - script: |
                  echo "=== Downloaded Artifacts ==="
                  echo "Pipeline Workspace: $(Pipeline.Workspace)"
                  dir "$(Pipeline.Workspace)\packages" /s
                  echo "=== Preparing to push to feed ==="
                  echo "Feed: Lucenec_0798_OT/Automation"
                displayName: 'Display Download Information'

              - task: NuGetCommand@2
                displayName: 'Push NuGet Package to Azure Artifacts (excludes symbols)'
                inputs:
                  command: 'push'
                  packagesToPush: '$(Pipeline.Workspace)/packages/**/*.nupkg;!$(Pipeline.Workspace)/packages/**/*.snupkg'
                  nuGetFeedType: 'internal'
                  publishVstsFeed: 'Lucenec_0798_OT/Automation'
                  allowPackageConflicts: true

              - script: |
                  echo "=== Publish Complete ==="
                  echo "Package published to: https://adient.visualstudio.com/Lucenec_0798_OT/_artifacts/feed/Automation"
                displayName: 'Publish Summary'
